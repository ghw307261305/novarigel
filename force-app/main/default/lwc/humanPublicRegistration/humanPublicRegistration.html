<template>
  <section class="page-shell slds-p-around_medium">
    <div
      class="hero-panel panel-box slds-box slds-var-p-around_large slds-var-m-bottom_large"
    >
      <div
        class="slds-grid slds-wrap slds-gutters_large slds-grid_vertical-align-center"
      >
        <div class="slds-col slds-size_1-of-1 slds-large-size_8-of-12">
          <span class="slds-badge slds-theme_inverse slds-var-m-bottom_small"
            >公開申込フォーム</span
          >
          <h1 class="slds-text-heading_large slds-var-m-bottom_small">
            {pageTitle}
          </h1>
          <p class="slds-text-body_regular slds-var-m-bottom_none">
            {introText}
          </p>
          <div
            class="hero-chip-row slds-grid slds-wrap slds-gutters_x-small slds-var-m-top_medium"
          >
            <div class="slds-col slds-grow-none">
              <span class="hero-chip slds-badge">匿名で申込可能</span>
            </div>
            <div class="slds-col slds-grow-none">
              <span class="hero-chip slds-badge">スマートフォン対応</span>
            </div>
            <div class="slds-col slds-grow-none">
              <span class="hero-chip slds-badge">確認画面あり</span>
            </div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12">
          <div
            class="hero-stat slds-box slds-theme_default slds-text-align_center"
          >
            <lightning-icon
              icon-name="utility:form"
              alternative-text="登録フォーム"
              size="medium"
            ></lightning-icon>
            <p
              class="slds-text-title_bold slds-var-m-top_small slds-var-m-bottom_x-small"
            >
              匿名でお申し込みいただけます
            </p>
            <p
              class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
            >
              必要事項の入力から送信完了まで、4つのステップでお手続きいただけます。
            </p>
          </div>
        </div>
      </div>
    </div>

    <template if:true={isLoading}>
      <div
        class="panel-box slds-box slds-theme_default slds-is-relative slds-var-p-around_x-large"
      >
        <lightning-spinner alternative-text="読み込み中"></lightning-spinner>
      </div>
    </template>

    <template if:false={isLoading}>
      <template if:true={loadError}>
        <section
          class="slds-notify slds-notify_alert slds-theme_error slds-theme_alert-texture slds-var-m-bottom_medium"
          role="alert"
        >
          <span class="slds-assistive-text">error</span>
          <h2 class="slds-text-heading_small slds-var-m-right_small">
            フォームを読み込めませんでした
          </h2>
          <p class="slds-var-m-right_medium">{loadError}</p>
          <lightning-button
            label="再読み込み"
            onclick={handleReload}
          ></lightning-button>
        </section>
      </template>

      <template if:false={loadError}>
        <div
          class="step-panel panel-box slds-box slds-theme_default slds-var-m-bottom_medium"
        >
          <div
            class="slds-grid slds-wrap slds-gutters_medium slds-grid_vertical-align-center slds-var-m-bottom_small"
          >
            <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
              <p
                class="slds-text-title_caps slds-text-color_weak slds-var-m-bottom_x-small"
              >
                Application Flow
              </p>
              <h2 class="slds-text-heading_small slds-var-m-bottom_none">
                お申し込みの流れ
              </h2>
            </div>
            <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
              <p
                class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
              >
                現在のお手続き状況を確認しながら、順番にご入力いただけます。
              </p>
            </div>
          </div>
          <div class="progress-scroller">
            <lightning-progress-indicator
              current-step={currentStep}
              type="base"
            >
              <lightning-progress-step
                label="入力"
                value="input"
              ></lightning-progress-step>
              <lightning-progress-step
                label="確認"
                value="confirm"
              ></lightning-progress-step>
              <lightning-progress-step
                label="規約"
                value="terms"
              ></lightning-progress-step>
              <lightning-progress-step
                label="完了"
                value="complete"
              ></lightning-progress-step>
            </lightning-progress-indicator>
          </div>
        </div>

        <template if:true={submissionError}>
          <section
            class="slds-notify slds-notify_alert slds-theme_error slds-theme_alert-texture slds-var-m-bottom_medium"
            role="alert"
          >
            <span class="slds-assistive-text">error</span>
            <p>{submissionError}</p>
          </section>
        </template>

        <template if:true={isInputStep}>
          <section
            class="surface-panel panel-box slds-box slds-theme_default slds-var-p-around_large"
          >
            <div
              class="slds-var-p-bottom_medium slds-var-m-bottom_large slds-border_bottom"
            >
              <h2 class="slds-text-heading_medium slds-var-m-bottom_x-small">
                求職者登録のお申し込み
              </h2>
              <p
                class="slds-text-body_regular slds-text-color_weak slds-var-m-bottom_none"
              >
                必要事項をご入力のうえ、内容確認へお進みください。
              </p>
            </div>

            <div
              class="info-banner slds-grid slds-wrap slds-grid_vertical-align-start slds-gutters_small slds-var-m-bottom_large"
            >
              <div class="slds-col slds-grow-none">
                <lightning-icon
                  icon-name="utility:info_alt"
                  alternative-text="ご案内"
                  size="x-small"
                ></lightning-icon>
              </div>
              <div class="slds-col slds-size_1-of-1 slds-large-size_11-of-12">
                <p class="slds-text-title_bold slds-var-m-bottom_xx-small">
                  ご案内
                </p>
                <p
                  class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                >
                  必須項目、電話番号や生年月日などの入力形式を確認しながら進められます。内容は送信前に確認画面でご確認いただけます。
                </p>
              </div>
            </div>

            <section class="section-card slds-var-m-bottom_large">
              <div class="section-header slds-var-m-bottom_medium">
                <div class="section-icon">
                  <lightning-icon
                    icon-name="utility:user"
                    alternative-text="基本情報"
                    size="x-small"
                  ></lightning-icon>
                </div>
                <div>
                  <p class="section-kicker">Basic Profile</p>
                  <h3
                    class="slds-text-heading_small slds-var-m-bottom_xx-small"
                  >
                    基本情報
                  </h3>
                  <p
                    class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                  >
                    お名前、フリガナ、性別、生年月日をご入力ください。
                  </p>
                </div>
              </div>
              <lightning-layout multiple-rows pull-to-boundary="small">
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="kanjiSei"
                    label="姓（漢字）"
                    value={form.kanjiSei}
                    required
                    maxlength="30"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="kanjiMei"
                    label="名（漢字）"
                    value={form.kanjiMei}
                    required
                    maxlength="30"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="kanaSei"
                    label="姓（カナ）"
                    value={form.kanaSei}
                    required
                    maxlength="30"
                    pattern="^[ァ-ンヴー]+$"
                    message-when-pattern-mismatch="全角カタカナで入力してください。"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="kanaMei"
                    label="名（カナ）"
                    value={form.kanaMei}
                    required
                    maxlength="30"
                    pattern="^[ァ-ンヴー]+$"
                    message-when-pattern-mismatch="全角カタカナで入力してください。"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-combobox
                    data-step="input"
                    data-field="sex"
                    label="性別"
                    value={form.sex}
                    options={sexOptions}
                    required
                    onchange={handleFieldChange}
                  ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="birthday"
                    type="date"
                    label="生年月日"
                    value={form.birthday}
                    max={today}
                    required
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
              </lightning-layout>
            </section>

            <section class="section-card slds-var-m-bottom_large">
              <div class="section-header slds-var-m-bottom_medium">
                <div class="section-icon">
                  <lightning-icon
                    icon-name="utility:email"
                    alternative-text="連絡先"
                    size="x-small"
                  ></lightning-icon>
                </div>
                <div>
                  <p class="section-kicker">Contact Details</p>
                  <h3
                    class="slds-text-heading_small slds-var-m-bottom_xx-small"
                  >
                    連絡先
                  </h3>
                  <p
                    class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                  >
                    メールアドレス、電話番号、ご住所、最寄り駅などの連絡先情報をご入力ください。
                  </p>
                </div>
              </div>
              <lightning-layout multiple-rows pull-to-boundary="small">
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="emailAdress"
                    type="email"
                    label="メールアドレス"
                    value={form.emailAdress}
                    required
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="emailAdressCheck"
                    type="email"
                    label="メールアドレス(確認)"
                    value={form.emailAdressCheck}
                    required
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="tel"
                    type="tel"
                    label="電話番号"
                    value={form.tel}
                    required
                    pattern="^[0-9]{2,4}-?[0-9]{2,4}-?[0-9]{3,4}$"
                    message-when-pattern-mismatch="電話番号の形式が正しくありません。"
                    placeholder="例: 090-1234-5678"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="postalCode"
                    label="郵便番号"
                    value={form.postalCode}
                    required
                    maxlength="8"
                    pattern="^[0-9]{3}-?[0-9]{4}$"
                    message-when-pattern-mismatch="郵便番号は7桁で入力してください。"
                    placeholder="例: 1234567"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-combobox
                    data-step="input"
                    data-field="prefectures"
                    label="都道府県"
                    value={form.prefectures}
                    options={prefectureOptions}
                    required
                    onchange={handleFieldChange}
                  ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="localAddress"
                    label="都道府県以下の住所"
                    value={form.localAddress}
                    required
                    maxlength="80"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="station1"
                    label="自宅最寄り駅・バス停(1)"
                    value={form.station1}
                    required
                    maxlength="50"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="commute1"
                    label="所要時間(1)"
                    value={form.commute1}
                    required
                    maxlength="20"
                    placeholder="例: 45分"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="station2"
                    label="自宅最寄り駅・バス停(2)"
                    value={form.station2}
                    maxlength="50"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="commute2"
                    label="所要時間(2)"
                    value={form.commute2}
                    maxlength="20"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="station3"
                    label="自宅最寄り駅・バス停(3)"
                    value={form.station3}
                    maxlength="50"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-input
                    data-step="input"
                    data-field="commute3"
                    label="所要時間(3)"
                    value={form.commute3}
                    maxlength="20"
                    onchange={handleFieldChange}
                  ></lightning-input>
                </lightning-layout-item>
              </lightning-layout>
            </section>

            <section class="section-card slds-var-m-bottom_large">
              <div class="section-header slds-var-m-bottom_medium">
                <div class="section-icon">
                  <lightning-icon
                    icon-name="utility:work_order_type"
                    alternative-text="活動希望"
                    size="x-small"
                  ></lightning-icon>
                </div>
                <div>
                  <p class="section-kicker">Activity Preferences</p>
                  <h3
                    class="slds-text-heading_small slds-var-m-bottom_xx-small"
                  >
                    活動希望
                  </h3>
                  <p
                    class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                  >
                    ご希望の活動内容、対象校種、勤務形態、対応可能な地域や時間帯をご選択ください。
                  </p>
                </div>
              </div>
              <lightning-layout multiple-rows pull-to-boundary="small">
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-combobox
                    data-step="input"
                    data-field="occupation"
                    label="現在の職業"
                    value={form.occupation}
                    options={occupationOptions}
                    required
                    onchange={handleFieldChange}
                  ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-combobox
                    data-step="input"
                    data-field="experience"
                    label="学校活動経験"
                    value={form.experience}
                    options={experienceOptions}
                    required
                    onchange={handleFieldChange}
                  ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <lightning-combobox
                    data-step="input"
                    data-field="kensyuKibou"
                    label="登録前研修"
                    value={form.kensyuKibou}
                    options={kensyuKibouOptions}
                    required
                    onchange={handleFieldChange}
                  ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <fieldset class="slds-form-element stacked-fieldset">
                    <legend
                      class="stacked-fieldset__legend slds-form-element__legend slds-form-element__label"
                    >
                      <abbr class="slds-required" title="required">*</abbr
                      >希望内容
                    </legend>
                    <div class="checkbox-grid checkbox-grid--wide">
                      <template for:each={requestActivityItems} for:item="item">
                        <div key={item.key} class="checkbox-grid__item">
                          <div class="choice-card">
                            <lightning-input
                              type="checkbox"
                              label={item.label}
                              checked={item.checked}
                              data-field="requestActivity"
                              data-value={item.value}
                              onchange={handleMultiSelectToggle}
                            ></lightning-input>
                          </div>
                        </div>
                      </template>
                    </div>
                    <template if:true={groupErrors.requestActivity}>
                      <div class="slds-form-element__help">
                        {groupErrors.requestActivity}
                      </div>
                    </template>
                  </fieldset>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <fieldset class="slds-form-element stacked-fieldset">
                    <legend
                      class="stacked-fieldset__legend slds-form-element__legend slds-form-element__label"
                    >
                      <abbr class="slds-required" title="required">*</abbr
                      >希望校種
                    </legend>
                    <div class="checkbox-grid checkbox-grid--compact">
                      <template for:each={schoolItems} for:item="item">
                        <div key={item.key} class="checkbox-grid__item">
                          <div class="choice-card">
                            <lightning-input
                              type="checkbox"
                              label={item.label}
                              checked={item.checked}
                              data-field="school"
                              data-value={item.value}
                              onchange={handleMultiSelectToggle}
                            ></lightning-input>
                          </div>
                        </div>
                      </template>
                    </div>
                    <template if:true={groupErrors.school}>
                      <div class="slds-form-element__help">
                        {groupErrors.school}
                      </div>
                    </template>
                  </fieldset>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <fieldset class="slds-form-element stacked-fieldset">
                    <legend
                      class="stacked-fieldset__legend slds-form-element__legend slds-form-element__label"
                    >
                      <abbr class="slds-required" title="required">*</abbr
                      >希望活動形態
                    </legend>
                    <div class="checkbox-grid checkbox-grid--compact">
                      <template for:each={activityFormItems} for:item="item">
                        <div key={item.key} class="checkbox-grid__item">
                          <div class="choice-card">
                            <lightning-input
                              type="checkbox"
                              label={item.label}
                              checked={item.checked}
                              data-field="activityForm"
                              data-value={item.value}
                              onchange={handleMultiSelectToggle}
                            ></lightning-input>
                          </div>
                        </div>
                      </template>
                    </div>
                    <template if:true={groupErrors.activityForm}>
                      <div class="slds-form-element__help">
                        {groupErrors.activityForm}
                      </div>
                    </template>
                  </fieldset>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <fieldset class="slds-form-element stacked-fieldset">
                    <legend
                      class="stacked-fieldset__legend slds-form-element__legend slds-form-element__label"
                    >
                      <abbr class="slds-required" title="required">*</abbr
                      >活動可能な曜日・時間帯
                    </legend>
                    <div class="checkbox-grid checkbox-grid--days">
                      <template
                        for:each={activityWeekTimeItems}
                        for:item="item"
                      >
                        <div key={item.key} class="checkbox-grid__item">
                          <div class="choice-card">
                            <lightning-input
                              type="checkbox"
                              label={item.label}
                              checked={item.checked}
                              data-field="activityWeekTime"
                              data-value={item.value}
                              onchange={handleMultiSelectToggle}
                            ></lightning-input>
                          </div>
                        </div>
                      </template>
                    </div>
                    <template if:true={groupErrors.activityWeekTime}>
                      <div class="slds-form-element__help">
                        {groupErrors.activityWeekTime}
                      </div>
                    </template>
                  </fieldset>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <lightning-dual-listbox
                    data-step="input"
                    data-field="area"
                    label="希望する地域（任意）"
                    source-label="候補"
                    selected-label="選択済み"
                    options={areaOptions}
                    value={form.area}
                    onchange={handleFieldChange}
                  ></lightning-dual-listbox>
                </lightning-layout-item>
              </lightning-layout>

              <template if:true={requiresTeachingSelections}>
                <div
                  class="conditional-panel slds-box slds-theme_shade slds-var-m-top_medium"
                >
                  <p
                    class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small"
                  >
                    部活動指導を選択したため、指導可能対象の入力が必要です。
                  </p>
                  <lightning-layout multiple-rows pull-to-boundary="small">
                    <lightning-layout-item size="12" padding="around-small">
                      <fieldset class="slds-form-element">
                        <legend
                          class="slds-form-element__legend slds-form-element__label"
                        >
                          <abbr class="slds-required" title="required">*</abbr
                          >指導可能対象（性別）
                        </legend>
                        <div class="checkbox-grid checkbox-grid--compact">
                          <template for:each={teachingSexItems} for:item="item">
                            <div key={item.key} class="checkbox-grid__item">
                              <div class="choice-card">
                                <lightning-input
                                  type="checkbox"
                                  label={item.label}
                                  checked={item.checked}
                                  data-field="teachingSex"
                                  data-value={item.value}
                                  onchange={handleMultiSelectToggle}
                                ></lightning-input>
                              </div>
                            </div>
                          </template>
                        </div>
                        <template if:true={groupErrors.teachingSex}>
                          <div class="slds-form-element__help">
                            {groupErrors.teachingSex}
                          </div>
                        </template>
                      </fieldset>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" padding="around-small">
                      <fieldset class="slds-form-element">
                        <legend
                          class="slds-form-element__legend slds-form-element__label"
                        >
                          <abbr class="slds-required" title="required">*</abbr
                          >指導可能対象（レベル）
                        </legend>
                        <div class="checkbox-grid checkbox-grid--compact">
                          <template
                            for:each={teachingLevelItems}
                            for:item="item"
                          >
                            <div key={item.key} class="checkbox-grid__item">
                              <div class="choice-card">
                                <lightning-input
                                  type="checkbox"
                                  label={item.label}
                                  checked={item.checked}
                                  data-field="teachingLevel"
                                  data-value={item.value}
                                  onchange={handleMultiSelectToggle}
                                ></lightning-input>
                              </div>
                            </div>
                          </template>
                        </div>
                        <template if:true={groupErrors.teachingLevel}>
                          <div class="slds-form-element__help">
                            {groupErrors.teachingLevel}
                          </div>
                        </template>
                      </fieldset>
                    </lightning-layout-item>
                  </lightning-layout>
                </div>
              </template>
            </section>

            <section class="section-card">
              <div class="section-header slds-var-m-bottom_medium">
                <div class="section-icon">
                  <lightning-icon
                    icon-name="utility:check"
                    alternative-text="資格・経験"
                    size="x-small"
                  ></lightning-icon>
                </div>
                <div>
                  <p class="section-kicker">Qualifications</p>
                  <h3
                    class="slds-text-heading_small slds-var-m-bottom_xx-small"
                  >
                    資格・経験
                  </h3>
                  <p
                    class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                  >
                    お持ちの資格や活用したいご経験がありましたらご入力ください。
                  </p>
                </div>
              </div>
              <lightning-layout multiple-rows pull-to-boundary="small">
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="teacherLicense"
                      type="checkbox"
                      label="教員免許状を有する"
                      checked={form.teacherLicense}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showTeacherLicenseType}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="licenseType"
                          label="教員免許状の種類"
                          value={form.licenseType}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="medicalCare"
                      type="checkbox"
                      label="医療・看護の資格を有する"
                      checked={form.medicalCare}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showMedicalCareName}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="medicalCareName"
                          label="医療・看護の資格の名称"
                          value={form.medicalCareName}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="welfare"
                      type="checkbox"
                      label="心理・福祉の資格を有する"
                      checked={form.welfare}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showWelfareName}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="welfareName"
                          label="心理・福祉の資格の名称"
                          value={form.welfareName}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="telecommunications"
                      type="checkbox"
                      label="情報通信の資格を有する"
                      checked={form.telecommunications}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showTelecommunicationsName}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="telecommunicationsName"
                          label="情報通信の資格の名称"
                          value={form.telecommunicationsName}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="sportsCulture"
                      type="checkbox"
                      label="運動・文化の資格を有する"
                      checked={form.sportsCulture}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showSportsCultureName}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="sportsCultureName"
                          label="運動・文化の資格の名称"
                          value={form.sportsCultureName}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item
                  size="12"
                  medium-device-size="6"
                  large-device-size="6"
                  padding="around-small"
                >
                  <div class="option-card slds-box slds-theme_default">
                    <lightning-input
                      data-step="input"
                      data-field="otherQualification"
                      type="checkbox"
                      label="その他の資格を有する"
                      checked={form.otherQualification}
                      onchange={handleFieldChange}
                    ></lightning-input>
                    <template if:true={showOtherQualificationName}>
                      <div class="slds-var-m-top_small">
                        <lightning-input
                          data-step="input"
                          data-field="nameQualification"
                          label="資格の名称"
                          value={form.nameQualification}
                          maxlength="50"
                          onchange={handleFieldChange}
                        ></lightning-input>
                      </div>
                    </template>
                  </div>
                </lightning-layout-item>
                <lightning-layout-item size="12" padding="around-small">
                  <lightning-textarea
                    data-step="input"
                    data-field="abilityAppeal"
                    label="活用したい能力・経験等（任意）"
                    value={form.abilityAppeal}
                    maxlength="600"
                    onchange={handleFieldChange}
                  ></lightning-textarea>
                </lightning-layout-item>
              </lightning-layout>
            </section>

            <div
              class="action-group slds-grid slds-wrap slds-grid_align-end slds-gutters_small slds-var-m-top_large"
            >
              <div class="action-group__item slds-col slds-grow-none">
                <lightning-button
                  variant="brand"
                  label="入力内容を確認"
                  onclick={handleReview}
                ></lightning-button>
              </div>
            </div>
          </section>
        </template>

        <template if:true={isConfirmStep}>
          <section
            class="surface-panel panel-box slds-box slds-theme_default slds-var-p-around_large"
          >
            <div
              class="slds-var-p-bottom_medium slds-var-m-bottom_large slds-border_bottom"
            >
              <h2 class="slds-text-heading_medium slds-var-m-bottom_x-small">
                ご入力内容の確認
              </h2>
              <p
                class="slds-text-body_regular slds-text-color_weak slds-var-m-bottom_none"
              >
                以下の内容でお申し込みを受け付けます。内容をご確認のうえ、利用規約へお進みください。
              </p>
            </div>

            <div
              class="confirm-banner slds-grid slds-wrap slds-grid_vertical-align-start slds-gutters_small slds-var-m-bottom_large"
            >
              <div class="slds-col slds-grow-none">
                <lightning-icon
                  icon-name="utility:check"
                  alternative-text="確認"
                  size="x-small"
                ></lightning-icon>
              </div>
              <div class="slds-col slds-size_1-of-1 slds-large-size_11-of-12">
                <p class="slds-text-title_bold slds-var-m-bottom_xx-small">
                  送信前の最終確認
                </p>
                <p
                  class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_none"
                >
                  修正が必要な場合は入力画面へ戻り、内容に問題がなければ利用規約へお進みください。
                </p>
              </div>
            </div>

            <template for:each={summarySections} for:item="section">
              <section
                key={section.key}
                class="confirm-section slds-var-m-top_large"
              >
                <div class="confirm-section__header slds-var-m-bottom_small">
                  <span class="confirm-section__title slds-badge"
                    >{section.title}</span
                  >
                </div>
                <div
                  class="confirm-card slds-box slds-theme_default slds-p-around_none"
                >
                  <template for:each={section.rows} for:item="row">
                    <div key={row.key} class="confirm-row">
                      <div class="confirm-label">
                        <p class="slds-m-bottom_none">{row.label}</p>
                      </div>
                      <div class="confirm-value summary-value">
                        <p class="slds-m-bottom_none">{row.value}</p>
                      </div>
                    </div>
                  </template>
                </div>
              </section>
            </template>

            <div
              class="action-group slds-grid slds-wrap slds-grid_align-end slds-gutters_small slds-var-m-top_large"
            >
              <div class="action-group__item slds-col slds-grow-none">
                <lightning-button
                  label="入力画面に戻る"
                  onclick={handleBackToInput}
                ></lightning-button>
              </div>
              <div class="action-group__item slds-col slds-grow-none">
                <lightning-button
                  variant="brand"
                  label="利用規約へ進む"
                  onclick={handleProceedToTerms}
                ></lightning-button>
              </div>
            </div>
          </section>
        </template>

        <template if:true={isTermsStep}>
          <section
            class="surface-panel panel-box slds-box slds-theme_default slds-var-p-around_large"
          >
            <div
              class="slds-var-p-bottom_medium slds-var-m-bottom_large slds-border_bottom"
            >
              <h2 class="slds-text-heading_medium slds-var-m-bottom_x-small">
                利用規約の確認
              </h2>
              <p
                class="slds-text-body_regular slds-text-color_weak slds-var-m-bottom_none"
              >
                内容をご確認のうえ、ご同意いただける場合は送信してください。
              </p>
            </div>

            <div
              class="subtle-panel rich-text-body slds-box slds-theme_shade slds-var-p-around_medium slds-var-m-bottom_medium"
            >
              <lightning-formatted-rich-text
                value={resolvedTermsRichText}
              ></lightning-formatted-rich-text>
            </div>

            <lightning-input
              data-step="terms"
              data-field="acceptedTerms"
              type="checkbox"
              label="利用規約に同意する"
              checked={form.acceptedTerms}
              onchange={handleFieldChange}
            ></lightning-input>

            <div
              class="action-group slds-grid slds-wrap slds-grid_align-end slds-gutters_small slds-var-m-top_large"
            >
              <div class="action-group__item slds-col slds-grow-none">
                <lightning-button
                  label="確認画面に戻る"
                  onclick={handleBackToConfirm}
                ></lightning-button>
              </div>
              <div class="action-group__item slds-col slds-grow-none">
                <lightning-button
                  variant="brand"
                  label="登録を送信"
                  onclick={handleSubmit}
                  disabled={submitDisabled}
                ></lightning-button>
              </div>
            </div>
          </section>
        </template>

        <template if:true={isCompleteStep}>
          <section
            class="success-panel panel-box slds-box slds-theme_default slds-var-p-around_x-large"
          >
            <div
              class="slds-grid slds-grid_vertical slds-grid_align-center slds-text-align_center"
            >
              <div class="slds-var-m-bottom_medium">
                <lightning-icon
                  icon-name="utility:success"
                  alternative-text="完了"
                  size="large"
                  variant="success"
                ></lightning-icon>
              </div>
              <h2 class="slds-text-heading_medium slds-var-m-bottom_small">
                お申し込みを受け付けました
              </h2>
              <p
                class="slds-text-body_regular slds-text-color_weak slds-var-m-bottom_none"
              >
                {resolvedCompletionMessage}
              </p>
            </div>
            <template if:true={completedRecordName}>
              <p
                class="slds-text-title_bold slds-text-align_center slds-var-m-top_large"
              >
                受付番号: {completedRecordName}
              </p>
            </template>
            <template if:true={completedStatus}>
              <p
                class="slds-text-title_bold slds-text-color_weak slds-text-align_center slds-var-m-top_small"
              >
                受付状況: {completedStatus}
              </p>
            </template>
          </section>
        </template>
      </template>
    </template>
  </section>
</template>
